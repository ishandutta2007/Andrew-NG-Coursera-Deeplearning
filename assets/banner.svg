<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="100%">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad1)" rx="20"/>
    
    <!-- Constellation / Network Effect -->
    <g stroke="rgba(255,255,255,0.2)" stroke-width="2">
        <line x1="150" y1="50" x2="250" y2="120"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" /></line>
        <line x1="150" y1="180" x2="250" y2="120"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite" /></line>
        <line x1="250" y1="120" x2="350" y2="80"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite" /></line>
        <line x1="250" y1="120" x2="350" y2="170"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite" /></line>
        
        <line x1="850" y1="50" x2="750" y2="120"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite" /></line>
        <line x1="850" y1="180" x2="750" y2="120"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.1s" repeatCount="indefinite" /></line>
        <line x1="750" y1="120" x2="650" y2="80"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite" /></line>
        <line x1="750" y1="120" x2="650" y2="170"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite" /></line>
    </g>
    
    <!-- Nodes -->
    <g fill="#60a5fa" filter="url(#glow)">
        <circle cx="150" cy="50" r="6"><animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite" /></circle>
        <circle cx="150" cy="180" r="5"><animate attributeName="r" values="5;7;5" dur="4s" repeatCount="indefinite" /></circle>
        <circle cx="250" cy="120" r="8"><animate attributeName="r" values="8;11;8" dur="2.5s" repeatCount="indefinite" /></circle>
        <circle cx="350" cy="80" r="6"><animate attributeName="r" values="6;8;6" dur="3.5s" repeatCount="indefinite" /></circle>
        <circle cx="350" cy="170" r="7"><animate attributeName="r" values="7;10;7" dur="2.8s" repeatCount="indefinite" /></circle>
        
        <circle cx="850" cy="50" r="6"><animate attributeName="r" values="6;9;6" dur="3.2s" repeatCount="indefinite" /></circle>
        <circle cx="850" cy="180" r="5"><animate attributeName="r" values="5;7;5" dur="4.1s" repeatCount="indefinite" /></circle>
        <circle cx="750" cy="120" r="8"><animate attributeName="r" values="8;11;8" dur="2.7s" repeatCount="indefinite" /></circle>
        <circle cx="650" cy="80" r="6"><animate attributeName="r" values="6;8;6" dur="3.8s" repeatCount="indefinite" /></circle>
        <circle cx="650" cy="170" r="7"><animate attributeName="r" values="7;10;7" dur="2.9s" repeatCount="indefinite" /></circle>
    </g>

    <!-- Main Text -->
    <text x="500" y="110" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
        DEEP LEARNING
    </text>
    <text x="500" y="160" font-family="Arial, sans-serif" font-size="20" font-weight="normal" fill="#93c5fd" text-anchor="middle" letter-spacing="4">
        SPECIALIZATION
    </text>
    
    <!-- Moving Data Packets -->
    <circle cx="0" cy="0" r="3" fill="#fbbf24" filter="url(#glow)">
        <animateMotion path="M150,50 L250,120 L350,80" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="3" fill="#fbbf24" filter="url(#glow)">
        <animateMotion path="M850,180 L750,120 L650,170" dur="4s" repeatCount="indefinite" />
    </circle>
</svg>
